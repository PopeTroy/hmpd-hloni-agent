name: Hloni Agentic Engine
on:
  repository_dispatch:
    types: [lead_captured]

jobs:
  analyze_and_dossier:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install groq

      - name: Run Hloni Predictive Logic
        id: hloni_logic
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          USER_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          python hloni_engine.py > dossier_output.txt

      - name: Send Dossier to HMPD Team
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{secrets.MAIL_USERNAME}}
          password: ${{secrets.MAIL_PASSWORD}}
          subject: "HLONI DOSSIER: High-Priority Lead Harvested"
          to: info@hmpd.co.za, sales@hmpd.co.za
          body_from_file: dossier_output.txt
