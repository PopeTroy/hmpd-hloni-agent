name: HMPD Agentic Engine V2.5

on:
  repository_dispatch:
    types: [dossier_finalized]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  structural_audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install groq

      - name: Execute Senior Diagnostic
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          USER_PAYLOAD: ${{ github.event.client_payload != null && toJson(github.event.client_payload) || '{"details":"Manual Check", "transaction_id":"manual"}' }}
        run: python hloni_engine.py

      - name: Commit and Push Unique Audit
        run: |
          git config --global user.name "Hloni-Agent"
          git config --global user.email "agent@hmpd.co.za"
          git add *.json
          git commit -m "New Unique Audit Generated [skip ci]" || echo "No changes"
          git push
