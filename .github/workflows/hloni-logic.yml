name: HMPD Agentic Engine V2.2

on:
  repository_dispatch:
    types: [dossier_finalized]
  workflow_dispatch: # This adds the "Run workflow" button in the Actions tab

jobs:
  structural_audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install groq

      - name: Execute Senior Diagnostic
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Safely handle the payload whether triggered by Dispatch or Manual run
          USER_PAYLOAD: ${{ github.event.client_payload != null && toJson(github.event.client_payload) || '{"details":"Manual Diagnostic Check"}' }}
        run: python hloni_engine.py
