name: HMPD Agentic Engine V2.2
on:
  repository_dispatch:
    types: [dossier_finalized]

jobs:
  structural_audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install groq

      - name: Execute Senior Diagnostic
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          USER_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: python hloni_engine.py
